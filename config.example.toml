# Dreamers Backend Configuration
# Copy to config.toml and adjust for your environment.

[server]
port = "8080"

[database]
url = "postgres://postgres:postgres@localhost:5432/dreamers?sslmode=disable"
migration_path = "./migrations"

[s3]
# S3 bucket for profile photos and Aadhar uploads (required for uploads)
bucket = ""
region = "us-east-1"
# Optional: CDN or custom domain base URL
base_url = ""
max_size_mb = 2
# Optional: use AWS_ACCESS_KEY_ID / AWS_SECRET_ACCESS_KEY env if not set
access_key = ""
secret_key = ""
